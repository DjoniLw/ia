name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Pegar diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }} > diff.txt

      - name: Instalar Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Rodar review com IA
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          node <<EOF
          const fs = require("fs");

          const diff = fs.readFileSync("diff.txt", "utf8").substring(0, 10000);

          const rules = fs.existsSync("AGENT_RULES.md")
            ? fs.readFileSync("AGENT_RULES.md", "utf8")
            : "";

          const ui = fs.existsSync("docs/ui-standards.md")
            ? fs.readFileSync("docs/ui-standards.md", "utf8")
            : "";

          const context = `
          AGENT RULES:
          ${rules}

          UI STANDARDS:
          ${ui}

          CODE DIFF:
          ${diff}
          `;

          async function run() {
            const response = await fetch("https://api.openai.com/v1/chat/completions", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + process.env.OPENAI_API_KEY
              },
              body: JSON.stringify({
                model: "gpt-4.1",
                messages: [
                  {
                    role: "system",
                    content: `
                        You are a senior software architect and code reviewer for a clinic management system.
                        
                        You MUST strictly validate:
                        
                        1. Architecture consistency with ai-engineering definitions
                        2. UI consistency with ui-standards.md
                        3. Business rules (wallet, billing, appointments)
                        4. Data integrity (no orphan records, safe deletes)
                        5. Concurrency issues (double booking, race conditions)
                        6. Code quality and unnecessary complexity
                        
                        Be strict. Do NOT accept weak implementations.
                        
                        Check specifically:
                        
                        - Appointment conflicts and stale availability
                        - Wallet credit generation and origin tracking
                        - UI patterns (filters, empty state, icons, unsaved changes guard)
                        
                        ---
                        
                        Output format:
                        
                        ## Quality Score (0–100)
                        
                        ## ✅ Correct
                        ## ⚠️ Issues
                        ## ❌ Critical Problems
                        ## 💡 Suggestions
                        
                        If there are critical problems, clearly explain why.
                        `
                  },
                  {
                    role: "user",
                    content: context
                  }
                ]
              })
            });

            const data = await response.json();
            const review = data.choices[0].message.content;

            fs.writeFileSync("review.txt", review);
          }

          run().catch(console.error);
          EOF

      - name: Comentar no PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: review.txt
