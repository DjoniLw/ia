name: Run Tests

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: aesthera/apps/api/package-lock.json

      - name: Instalar dependências (API)
        working-directory: aesthera/apps/api
        run: npm ci

      - name: Rodar testes (API)
        working-directory: aesthera/apps/api
        run: npm test